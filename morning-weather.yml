# このファイルは「いつ・何を自動で動かすか」の予約表です。
# GitHub が毎日この予約どおりにプログラムを動かしてくれます。

name: 天気と災害情報をLINEに通知

on:
  schedule:
    # 混雑を避けるため半端な分にしています。UTC表記(日本時間−9時間)
    - cron: "47 19 * * *" # 日本時間 朝5:47予約 → 6:30前後に届く想定
    - cron: "13 1 * * *"  # 日本時間 昼11:13予約 → 12:00前後に届く想定
  workflow_dispatch: {}   # 手動テスト用

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 天気・災害情報を取得してLINEに送信
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          # 「どの予約で起動したか」で判定するので、何時間遅れても朝は必ず天気が届く
          if [ "${{ github.event.schedule }}" = "13 2 * * *" ]; then
            MODE=noon
          else
            MODE=morning
          fi
          echo "実行モード: $MODE"
          python weather_notify.py $MODE
