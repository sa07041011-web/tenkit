# このファイルは「いつ・何を自動で動かすか」の予約表です。
# GitHub が毎日この予約どおりにプログラムを動かしてくれます。

name: 天気と災害情報をLINEに通知

on:
  schedule:
    # 時刻は「世界標準時(UTC)」で書くルール。日本時間より9時間前です。
    - cron: "45 20 * * *" # 日本時間 朝5:45 → 天気+警報を通知
    - cron: "0 3 * * *"   # 日本時間 昼12:00 → 警報が出ていれば通知
  workflow_dispatch: {}   # 「Run workflow」ボタンで手動テストもできる

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 天気・災害情報を取得してLINEに送信
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          # 今の日本時間が朝(9時より前)なら morning、それ以外は noon として実行
          HOUR=$(TZ=Asia/Tokyo date +%H)
          if [ "$HOUR" -lt 9 ]; then MODE=morning; else MODE=noon; fi
          echo "実行モード: $MODE"
          python weather_notify.py $MODE
