# このファイルは「いつ・何を自動で動かすか」の予約表です。
# GitHub が毎日この予約どおりにプログラムを動かしてくれます。

name: 天気と災害情報をLINEに通知

on:
  schedule:
    - cron: "47 19 * * *" # 日本時間 朝4:47予約
    - cron: "13 1 * * *"  # 日本時間 昼10:13予約
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 天気・災害情報を取得してLINEに送信
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          if [ "${{ github.event.schedule }}" = "13 1 * * *" ]; then
            MODE=noon
          else
            MODE=morning
          fi
          echo "実行モード: $MODE"
          python weather_notify.py $MODE
